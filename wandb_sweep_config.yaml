method: bayes
metric:
  goal: maximize
  name: final_accuracy
parameters:
  anm_warmup_steps:
    values: [100, 250, 500, 750, 1000]
  anm_adversarial_steps:
    values: [1, 2, 3, 4, 5, 6]
  anm_distance_penalty:
    distribution: log_uniform_values
    values: [0.001, 0.01, 0.05, 0.1, 0.2, 0.5, 1.0]
early_terminate:
  type: hyperband
  min_iter: 3
